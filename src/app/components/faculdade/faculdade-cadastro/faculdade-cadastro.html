<div class="flex flex-col gap-6">
    <div>
        <label for="nome" class="block font-bold mb-3">Nome</label>
        <input type="text" pInputText id="nome" [(ngModel)]="faculdade.nome" required autofocus fluid />
        <small class="text-red-500" *ngIf="submitted && !faculdade.nome">O Nome é obrigatório.</small>
    </div>

    <div class="grid grid-cols-12 gap-4">
        <div class="col-span-6">
            <label for="cpf" class="block font-bold mb-3">Endereço</label>
            <input type="text" pInputText id="cpf" [(ngModel)]="faculdade.endereco" fluid />
            <small class="text-red-500" *ngIf="submitted && !faculdade.endereco">O Endereço é obrigatório.</small>
        </div>
    </div>
</div>

<div class="flex justify-end gap-2 mt-4">
    <p-button label="Cancelar" icon="pi pi-times" text (onClick)="cancelar()" />
    <p-button label="Salvar" icon="pi pi-check" (onClick)="confirmarSalvar()" />
</div>
