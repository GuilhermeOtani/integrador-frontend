<div class="flex flex-col gap-6">
  <div>
    <label for="nome" class="block font-bold mb-3">Nome</label>
    <input type="text" pInputText id="nome" [(ngModel)]="motorista.nome" required autofocus fluid />
    <small class="text-red-500" *ngIf="submitted && !motorista.nome">O Nome é obrigatório.</small>
  </div>

  <div class="grid grid-cols-12 gap-4">
    <div class="col-span-6">
      <label for="cpf" class="block font-bold mb-3">CPF</label>
      <p-inputMask 
        id="cpf" 
        mask="999.999.999-99" 
        [(ngModel)]="motorista.cpfCnpj" 
        [fluid]="true" 
        placeholder="000.000.000-00"
      ></p-inputMask>
      <small class="text-red-500" *ngIf="submitted && !motorista.cpfCnpj">O CPF é obrigatório.</small>
    </div>
    
    <div class="col-span-6">
      <label for="telefone" class="block font-bold mb-3">Telefone</label>
      <p-inputMask 
        id="telefone" 
        mask="(99) 99999-9999" 
        [(ngModel)]="motorista.telefone" 
        [fluid]="true" 
        placeholder="(00) 00000-0000"
      ></p-inputMask>
      <small class="text-red-500" *ngIf="submitted && !motorista.telefone">O Telefone é obrigatório.</small>
    </div>
  </div>

  <div class="grid grid-cols-12 gap-4">
    <div class="col-span-6">
      <label for="cnh" class="block font-bold mb-3">CNH</label>
      <p-inputMask 
        id="cnh" 
        mask="99999999999" 
        [(ngModel)]="motorista.cnh" 
        [fluid]="true" 
        placeholder="00000000000"
      ></p-inputMask>
      <small class="text-red-500" *ngIf="submitted && !motorista.cnh">A CNH é obrigatória.</small>
    </div>


    <div class="col-span-12 md:col-span-6">
    <label for="salario" class="block font-bold mb-3">Salário (R$)</label>
    <p-inputNumber 
        id="salario" 
        [(ngModel)]="motorista.salario" 
        mode="currency" 
        currency="BRL" 
        locale="pt-BR" 
        [required]="true"
        fluid>
    </p-inputNumber>
    <small class="text-red-500" *ngIf="submitted && !motorista.salario">
        O Salário é obrigatório para gerar as contas a pagar.
    </small>
</div>

    <div class="col-span-6">
      <label for="onibus" class="block font-bold mb-3">Ônibus</label>
      <p-select
        id="onibus"
        [options]="onibus"
        [(ngModel)]="motorista.onibusId"
        optionLabel="numeroIdentificacao"
        optionValue="id"
        placeholder="Selecione um Ônibus"
        [fluid]="true"
        appendTo="body"
      ></p-select>
      <small class="text-red-500" *ngIf="submitted && !motorista.onibusId">O Ônibus é obrigatório.</small>
    </div>
  </div>

  <hr class="border-t border-gray-200 dark:border-gray-700 mt-2" />

  <div class="flex justify-end gap-2">
    <p-button label="Cancelar" icon="pi pi-times" text (onClick)="cancelar()" />
    <p-button label="Salvar" icon="pi pi-check" (onClick)="confirmarSalvar()" />
  </div>
</div>
