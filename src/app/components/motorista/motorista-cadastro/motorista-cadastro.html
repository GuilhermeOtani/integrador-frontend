<div class="flex flex-col gap-6">
  <div>
    <label for="nome" class="block font-bold mb-3">Nome</label>
    <input type="text" pInputText id="nome" [(ngModel)]="motorista.nome" required autofocus fluid />
    <small class="text-red-500" *ngIf="submitted && !motorista.nome">O Nome é obrigatório.</small>
  </div>

  <div class="grid grid-cols-12 gap-4">
    <div class="col-span-6">
      <label for="cpf" class="block font-bold mb-3">CPF</label>
      <input type="text" pInputText id="cpf" [(ngModel)]="motorista.cpfCnpj" fluid />
      <small class="text-red-500" *ngIf="submitted && !motorista.cpfCnpj">O CPF é obrigatório.</small>
    </div>
    <div class="col-span-6">
      <label for="telefone" class="block font-bold mb-3">Telefone</label>
      <input type="text" pInputText id="telefone" [(ngModel)]="motorista.telefone" fluid />
      <small class="text-red-500" *ngIf="submitted && !motorista.telefone"
        >O Telefone é obrigatório.</small
      >
    </div>
  </div>

  <div class="grid grid-cols-12 gap-4">
    <div class="col-span-6">
      <label for="cnh" class="block font-bold mb-3">CNH</label>
      <input type="text" pInputText id="cnh" [(ngModel)]="motorista.cnh" fluid />
      <small class="text-red-500" *ngIf="submitted && !motorista.cnh"
        >A CNH é obrigatória.</small
      >
    </div>

    <div class="col-span-6">
      <label for="onibus" class="block font-bold mb-3">Onibus</label>
      <p-select
        id="onibus"
        [options]="onibus"
        [(ngModel)]="motorista.onibusId"
        optionLabel="numeroIdentificacao"
        optionValue="id"
        placeholder="Selecione um Onibus"
        [fluid]="true"
        appendTo="body"
      ></p-select>
      <small class="text-red-500" *ngIf="submitted && !motorista.onibusId"
        >O Onibus é obrigatório.</small
      >
    </div>
  </div>

  <div class="flex justify-end gap-2 mt-4">
    <p-button label="Cancelar" icon="pi pi-times" text (onClick)="cancelar()" />
    <p-button label="Salvar" icon="pi pi-check" (onClick)="confirmarSalvar()" />
  </div>
</div>
