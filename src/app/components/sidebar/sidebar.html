<div style="margin-top: 1rem; margin-left: 1rem">
  <p-button (click)="visible = true" icon="pi pi-bars" />
</div>

<div class="card flex justify-center">
  <p-drawer #drawerRef [(visible)]="visible" [style]="{ width: '270px' }">
    <ng-template #headless>
      <div class="flex flex-col h-full bg-surface-0 dark:bg-surface-900">
        <div
          class="flex items-center justify-center px-4 py-4 border-b border-surface-200 dark:border-surface-700 shrink-0"
        >
          <span class="inline-flex items-center gap-3">
            <svg
              width="44"
              height="44"
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
              class="block drop-shadow-md transition-transform hover:scale-105"
            >
              <path d="M12 2L2 7.5L12 13L22 7.5L12 2Z" fill="var(--p-primary-color)" />
              <path
                d="M2 7.5V16.5L12 22V13L2 7.5Z"
                fill="var(--p-primary-color)"
                fill-opacity="0.8"
              />
              <path
                d="M22 7.5V16.5L12 22V13L22 7.5Z"
                fill="var(--p-primary-color)"
                fill-opacity="0.5"
              />
              <path
                d="M6.5 6.5L12 9.5L17.5 6.5"
                stroke="#ffffff"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <circle cx="6.5" cy="6.5" r="1.5" fill="#ffffff" />
              <circle cx="12" cy="9.5" r="1.5" fill="#ffffff" />
              <circle cx="17.5" cy="6.5" r="1.5" fill="#ffffff" />
            </svg>
            <span class="font-extrabold text-2xl text-primary tracking-wide">BusSystem</span>
          </span>
        </div>

        <div class="overflow-y-auto no-scrollbar">
          <ul class="list-none px-4 pt-4 pb-0 m-0">
            <li>
              <div
                pRipple
                (click)="menuFavorites = !menuFavorites"
                class="p-4 flex items-center justify-between text-surface-600 dark:text-surface-200 cursor-pointer select-none p-ripple"
              >
                <span class="font-medium">CADASTROS</span>
                <i
                  class="pi pi-chevron-down transition-transform duration-300"
                  [class.-rotate-180]="menuFavorites"
                ></i>
              </div>
              <div
                class="overflow-hidden transition-all duration-500 ease-in-out"
                [ngClass]="menuFavorites ? 'max-h-[1000px] opacity-100' : 'max-h-0 opacity-0'"
              >
                <ul class="list-none p-0 m-0">
                  <li>
                    <a
                      pRipple
                      routerLink="/alunos"
                      (click)="visible = false"
                      class="flex items-center cursor-pointer p-4 rounded-border text-surface-700 dark:text-surface-100 hover:bg-surface-100 dark:hover:bg-surface-700 duration-150 transition-colors p-ripple"
                    >
                      <i class="pi pi-users mr-2"></i>
                      <span class="font-medium">Alunos</span>
                    </a>
                  </li>
                  <li>
                    <a
                      pRipple
                      routerLink="/faculdades"
                      (click)="visible = false"
                      class="flex items-center cursor-pointer p-4 rounded-border text-surface-700 dark:text-surface-100 hover:bg-surface-100 dark:hover:bg-surface-700 duration-150 transition-colors p-ripple"
                    >
                      <i class="pi pi-building mr-2"></i>
                      <span class="font-medium">Faculdades</span>
                    </a>
                  </li>
                
                </ul>
              </div>
            </li>
          </ul>
        </div>

        <div class="mt-auto">
          <hr class="mb-2 mx-3 border-t border-0 border-surface" />

          <a
            pRipple
            class="m-3 flex items-center cursor-pointer p-2 gap-2 rounded-border text-surface-700 dark:text-surface-100 hover:bg-surface-100 dark:hover:bg-surface-700 duration-150 transition-colors p-ripple"
